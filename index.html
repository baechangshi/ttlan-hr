<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정겨운뜰안 근무표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efeb;
  --text1:#1a1a1a;--text2:#6b6b6b;--text3:#999990;
  --border1:rgba(0,0,0,0.25);--border2:rgba(0,0,0,0.15);--border3:rgba(0,0,0,0.08);
  --radius:8px;--radius-lg:12px;--blue:#185FA5;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text1)}

/* ── 공통 레이아웃 ── */
.page{padding:1.5rem}
.page-header{display:flex;align-items:flex-end;gap:16px;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1.5px solid var(--border1)}
.page-title{font-size:20px;font-weight:500;color:var(--text1)}
.page-sub{font-size:14px;color:var(--text3);margin-bottom:2px}
.page-month{font-size:14px;color:var(--text3);margin-bottom:3px}

/* ── 탭 ── */
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1.5px solid var(--border2)}
.tab-btn{padding:8px 24px;font-size:14px;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;color:var(--text2);background:transparent;margin-bottom:-1.5px;font-family:inherit}
.tab-btn.active{background:var(--bg);border-color:var(--border2);border-bottom-color:var(--bg);color:var(--text1);font-weight:500}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── 근무표 ── */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:1.2rem}
.toolbar-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:160px}
.toolbar-title{font-size:18px;font-weight:500;color:var(--text1)}
.toolbar-sub{font-size:13px;color:var(--text3)}
.search-box{padding:6px 12px;border:1px solid var(--border1);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text1);width:160px}
.filter-btn{padding:5px 14px;border:1px solid var(--border1);border-radius:var(--radius);font-size:13px;cursor:pointer;background:var(--bg2);color:var(--text2)}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.2rem;align-items:center;padding-bottom:1.2rem;border-bottom:1px solid var(--border2)}
.leg{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2)}
.leg-dot{width:16px;height:16px;border-radius:3px;flex-shrink:0}
.sc-table-wrap{overflow:auto;border:1.5px solid var(--border1);border-radius:var(--radius-lg);max-height:660px;position:relative}
.sc-table-wrap table{border-collapse:collapse;font-size:13px;width:max-content}
.sc-table-wrap th,.sc-table-wrap td{border-bottom:1px solid var(--border3)}
.sc-table-wrap th{background:var(--bg);color:var(--text2);font-weight:500;padding:7px 5px;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:2}
.sc-table-wrap th.col-name{text-align:left;padding-left:10px;min-width:80px;position:sticky;left:0;z-index:3;background:var(--bg);border-right:2px solid var(--border1)}
.sc-table-wrap td{padding:3px 4px;text-align:center;background:var(--bg)}
.sc-table-wrap td.col-name{text-align:left;padding-left:10px;font-weight:500;white-space:nowrap;position:sticky;left:0;background:var(--bg);z-index:1;border-right:2px solid var(--border1);font-size:13px;color:var(--text1)}
.sc-table-wrap tr:hover td{background:var(--bg2)!important}
.sc-table-wrap tr:hover td.col-name{background:var(--bg2)!important}
.cell{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer}
.cell:hover{outline:2px solid var(--blue);outline-offset:1px}
.cell-D{background:#B5D4F4;color:#0C447C}
.cell-N{background:#3C3489;color:#CECBF6}
.cell-HD{background:#9FE1CB;color:#085041}
.cell-HE{background:#C0DD97;color:#27500A}
.cell-E{background:#85B7EB;color:#042C53}
.cell-S{background:#FAC775;color:#633806}
.cell-S4{background:#EF9F27;color:#412402}
.cell-F{background:#888780;color:#F1EFE8}
.cell-연{background:#F4C0D1;color:#4B1528}
.cell-병{background:#F7C1C1;color:#501313}
.cell-조의{background:#D3D1C7;color:#2C2C2A}
.cell-결혼{background:#EEEDFE;color:#26215C}
.cell-off{background:transparent;color:var(--text3)}
.sc-table-wrap th.sun,.sc-table-wrap td.sun{background:#FEF5F5}
.sc-table-wrap th.sat,.sc-table-wrap td.sat{background:#F5F8FE}
.section-header td{background:var(--bg2)!important;color:var(--text2);font-size:12px;font-weight:500;padding:5px 10px;border-top:2px solid var(--border1);border-bottom:2px solid var(--border1)}
.cnt-td{font-size:12px;font-weight:500;text-align:center;padding:3px 5px}
.time-td{font-size:12px;text-align:right;padding:3px 7px;color:var(--text2)}
.time-td.bold{font-weight:500;color:var(--text1)}
.juhyu-input{width:44px;font-size:12px;text-align:center;border:1px solid var(--border1);border-radius:3px;background:var(--bg);color:var(--text1);padding:2px 3px}
.popup{position:absolute;z-index:300;background:var(--bg);border:1.5px solid var(--border1);border-radius:var(--radius);padding:7px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;min-width:150px;box-shadow:0 4px 16px rgba(0,0,0,0.18)}
.pop-opt{display:flex;align-items:center;justify-content:center;height:28px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;padding:0 6px}
.pop-opt:hover{outline:2px solid var(--blue);outline-offset:1px}
.pop-clear{grid-column:1/-1;background:var(--bg2);color:var(--text3);font-size:12px;text-align:center;border-radius:4px;padding:4px;cursor:pointer;border:1px solid var(--border2)}
.pop-clear:hover{color:var(--text2)}

/* ── 급여대장 ── */
.py-table-wrap{overflow:auto;border:1.5px solid var(--border1);border-radius:var(--radius-lg);max-height:640px}
.py-table-wrap table{border-collapse:collapse;table-layout:fixed;width:max-content}
.py-table-wrap th,.py-table-wrap td{border-bottom:1px solid var(--border3);overflow:hidden;white-space:nowrap}
.py-table-wrap th{background:var(--bg);color:var(--text2);font-weight:500;padding:7px 4px;text-align:center;position:sticky;top:0;z-index:2;font-size:11px}
.py-table-wrap th.col-name{text-align:left;padding-left:8px;width:68px;position:sticky;left:0;z-index:3;background:var(--bg);border-right:2px solid var(--border1)}
.py-table-wrap th.grp{border-left:2px solid var(--border1)}
.py-table-wrap th.grp2{border-left:1px solid var(--border2)}
.py-table-wrap th.has-tip{cursor:help}
.py-table-wrap td{padding:4px 4px;text-align:right;background:var(--bg);color:var(--text1);font-size:12px}
.py-table-wrap td.col-name{text-align:left;padding-left:8px;font-weight:500;position:sticky;left:0;background:var(--bg);z-index:1;border-right:2px solid var(--border1);width:68px}
.py-table-wrap td.dept{background:var(--bg2)!important;color:var(--text2);font-size:11px;font-weight:500;padding:4px 10px;border-top:2px solid var(--border1);border-bottom:2px solid var(--border1);text-align:left}
.py-table-wrap td.grp{border-left:2px solid var(--border1)}
.py-table-wrap td.grp2{border-left:1px solid var(--border2)}
.py-table-wrap td.sum{font-weight:500;background:#f0f7ff!important;color:#0C447C}
.py-table-wrap td.sum.col-name{background:#f0f7ff!important}
.py-table-wrap td.sum.red{color:#A32D2D}
.py-table-wrap tr:hover td:not(.dept):not(.sum){background:var(--bg2)!important}
.py-table-wrap tr:hover td.col-name:not(.sum){background:var(--bg2)!important}
.editable{background:transparent;border:none;width:100%;font-size:12px;text-align:right;color:var(--text1);padding:0;font-family:inherit}
.editable:focus{outline:1.5px solid var(--blue);border-radius:3px;background:var(--bg)}
.ins-cell{display:flex;align-items:center;justify-content:flex-end;gap:3px}
select.ins-sel{font-size:10px;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg);color:var(--text2);padding:1px 1px;cursor:pointer;flex-shrink:0}
.tooltip-wrap{position:relative;display:inline-block;width:100%}
.tooltip{display:none;position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;z-index:100;font-weight:400}
.tooltip-wrap:hover .tooltip{display:block}
.summary-bar{display:flex;gap:12px;margin-top:1rem;flex-wrap:wrap}
.sum-card{background:var(--bg2);border-radius:var(--radius);padding:10px 16px;min-width:140px}
.sum-card-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.sum-card-val{font-size:15px;font-weight:500;color:var(--text1)}
</style>
</head>
<body>

<div class="page">
  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <div class="page-sub">정겨운뜰안 근무표</div>
      <div class="page-title">2026년 4월</div>
    </div>
  </div>

  <!-- 탭 버튼 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('schedule',this)">근무표</button>
    <button class="tab-btn" onclick="switchTab('payroll',this)">급여대장</button>
  </div>

  <!-- ── 근무표 탭 ── -->
  <div id="tab-schedule" class="tab-content active">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="toolbar-title">근무표</div>
        <div class="toolbar-sub">셀 클릭으로 변경 · 같은 셀 다시 클릭하면 닫힘</div>
      </div>
      <input class="search-box" type="text" placeholder="직원 검색..." id="search" oninput="applyFilter()">
      <button class="filter-btn active" onclick="filterDept('all',this)">전체</button>
      <button class="filter-btn" onclick="filterDept('시설/사무',this)">시설/사무</button>
      <button class="filter-btn" onclick="filterDept('의료',this)">의료</button>
      <button class="filter-btn" onclick="filterDept('본관',this)">본관</button>
      <button class="filter-btn" onclick="filterDept('신관2층',this)">신관2층</button>
      <button class="filter-btn" onclick="filterDept('신관1층',this)">신관1층</button>
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-dot cell-D"></div>D</div>
      <div class="leg"><div class="leg-dot cell-N"></div>N</div>
      <div class="leg"><div class="leg-dot cell-HD"></div>HD</div>
      <div class="leg"><div class="leg-dot cell-HE"></div>HE</div>
      <div class="leg"><div class="leg-dot cell-E"></div>E</div>
      <div class="leg"><div class="leg-dot cell-S"></div>S</div>
      <div class="leg"><div class="leg-dot cell-S4"></div>S4</div>

      <div class="leg"><div class="leg-dot cell-연"></div>연</div>
      <div class="leg"><div class="leg-dot cell-병"></div>병</div>
      <div class="leg"><div class="leg-dot cell-조의"></div>조의</div>
      <div class="leg"><div class="leg-dot cell-결혼"></div>결혼</div>
    </div>
    <div class="sc-table-wrap" id="tableWrap">
      <table id="mainTable">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── 급여대장 탭 ── -->
  <div id="tab-payroll" class="tab-content">
    <div class="toolbar" style="margin-bottom:1.2rem">
      <div class="toolbar-left">
        <div class="toolbar-title">급여대장</div>
        <div class="toolbar-sub">장기근속·인력취약 수동 입력 · 4대보험 면제 선택 가능</div>
      </div>
    </div>
    <div class="py-table-wrap">
      <table id="payTable">
        <colgroup>
          <col style="width:68px"><col style="width:52px">
          <col style="width:72px"><col style="width:72px"><col style="width:72px">
          <col style="width:72px"><col style="width:72px"><col style="width:72px">
          <col style="width:72px"><col style="width:72px">
          <col style="width:82px">
          <col style="width:68px"><col style="width:58px">
          <col style="width:96px"><col style="width:96px"><col style="width:96px"><col style="width:96px">
          <col style="width:76px"><col style="width:82px">
        </colgroup>
        <thead>
          <tr>
            <th class="col-name">직원</th>
            <th>시급</th>
            <th>주간급여</th><th>야간급여</th><th>연차수당</th>
            <th>병가수당</th><th>경조사</th><th>주휴수당</th>

            <th class="grp" style="font-weight:600;color:var(--text1)">지급총액</th>
            <th class="grp2 has-tip"><div class="tooltip-wrap">갑근세<div class="tooltip">간이세액표 1인 기준</div></div></th>
            <th class="grp2 has-tip"><div class="tooltip-wrap">주민세<div class="tooltip">갑근세의 10%</div></div></th>

            <th class="grp2 has-tip"><div class="tooltip-wrap">건강보험<div class="tooltip">요율 3.545%</div></div></th>
            <th class="grp2 has-tip"><div class="tooltip-wrap">장기요양<div class="tooltip">건강보험료의 12.95%</div></div></th>
            <th class="grp2 has-tip"><div class="tooltip-wrap">고용보험<div class="tooltip">요율 0.9%</div></div></th>

            <th class="grp" style="font-weight:600;color:var(--text1)">실지급액</th>
          </tr>
        </thead>
        <tbody id="payBody"></tbody>
      </table>
    </div>
    <div class="summary-bar" id="summaryBar"></div>
  </div>
</div>

function cellCls(code){return code&&CODE_COLORS[code]?'cell-'+code:'cell-off'}
function fmtNum(v){return v%1===0?String(v):v.toFixed(1)}

function calcStats(gi){
  const s=schedules[gi];
  const cnt={};CODES.forEach(c=>cnt[c]=0);
  let dh=0,nh=0,ah=0,sh=0,ch=0,wd=0;
  s.forEach(c=>{
    if(c&&cnt[c]!==undefined)cnt[c]++;
    dh+=dayH(c||'');nh+=nightH(c||'');ah+=annH(c||'');
    sh+=sickH(c||'');ch+=condH(c||'');wd+=wdayVal(c||'');
  });
  return{cnt,dh,nh,ah,sh,ch,total:dh+nh+ah+sh+ch,wd};
}

function buildTable(){
  const TIME_COLS=['주간','야간','연차','병가','경조사','총시간','근무일수','주휴수당'];
  let r='<tr><th class="col-name">직원</th>';
  for(let d=1;d<=NDAYS;d++){

  }

    const col=CNT_COLORS[c]||'#6b6b6b';
    const bdr=i===0?'border-left:2px solid rgba(0,0,0,0.25)':'';
    r+=`<th style="font-size:12px;color:${col};min-width:32px;${bdr}">${c}</th>`;

  let body='';

    body+=`<tr class="section-header" data-dept="${dept}"><td colspan="999">${dept}</td></tr>`;

      times.forEach((v,i)=>{
        const bold=i>=5?' bold':'';

    });
  });

}

function scRefreshRow(gi){
  const st=calcStats(gi);
  CODES.forEach(c=>{const el=document.getElementById(`cnt-${gi}-${c}`);if(el)el.textContent=st.cnt[c]||'';});
  [st.dh,st.nh,st.ah,st.sh,st.ch,st.total,st.wd].forEach((v,i)=>{
    const el=document.getElementById(`th-${gi}-${i}`);if(el)el.textContent=fmtNum(v);
  });

function togglePopup(e,gi,di){
  e.stopPropagation();
  const key=`${gi}-${di}`;
  if(activePopupKey===key){closePopup();return;}
  closePopup();
  const cell=e.currentTarget;
  const wrap=document.getElementById('tableWrap');
  const cr=cell.getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const popup=document.createElement('div');
  popup.className='popup';
  popup.style.cssText=`position:absolute;top:${cr.bottom-wr.top+wrap.scrollTop+4}px;left:${cr.left-wr.left+wrap.scrollLeft}px`;
  CODES.forEach(code=>{
    const c=CODE_COLORS[code];
    const opt=document.createElement('div');
    opt.className='pop-opt';
    opt.style.cssText=`background:${c.bg};color:${c.txt}`;
    opt.textContent=code;
    opt.onclick=ev=>{ev.stopPropagation();applyCode(gi,di,code);closePopup();};
    popup.appendChild(opt);
  });
  const clr=document.createElement('div');
  clr.className='pop-clear';clr.textContent='- 비우기';
  clr.onclick=ev=>{ev.stopPropagation();applyCode(gi,di,null);closePopup();};
  popup.appendChild(clr);
  wrap.appendChild(popup);
  activePopup=popup;activePopupKey=key;
}

function closePopup(){if(activePopup){activePopup.remove();activePopup=null;activePopupKey=null;}}

function applyCode(gi,di,code){
  schedules[gi][di]=code;
  const cell=document.querySelector(`.cell[data-emp="${gi}"][data-day="${di}"]`);
  if(cell){cell.className='cell '+cellCls(code);cell.textContent=code||'-';}
  scRefreshRow(gi);
  pyRefreshRow(gi); // 급여대장도 연동
}

function filterDept(dept,btn){
  currentDept=dept;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');applyFilter();
}

function applyFilter(){
  const q=document.getElementById('search').value.trim();
  document.querySelectorAll('#tbody tr').forEach(r=>{
    if(r.classList.contains('section-header')){r.style.display=(currentDept==='all'||currentDept===r.dataset.dept)?'':'none';return;}
    const ok=(!q||r.dataset.name.includes(q))&&(currentDept==='all'||currentDept===r.dataset.dept);
    r.style.display=ok?'':'none';
  });
}

function lookupTax(income){
  if(income<1060000)return 0;
  let tax=0;
  for(let i=TAX_TABLE.length-1;i>=0;i--){if(income>=TAX_TABLE[i][0]){tax=TAX_TABLE[i][1]||0;break;}}
  return tax;
}

function calcPay(gi){
  const emp=employees[gi];const s=schedules[gi];const r=emp.rate;
  const dh=s.reduce((a,c)=>a+dayH(c||''),0);
  const nh=s.reduce((a,c)=>a+nightH(c||''),0);
  const ah=s.reduce((a,c)=>a+annH(c||''),0);
  const bh=s.reduce((a,c)=>a+sickH(c||''),0);
  const ch=s.reduce((a,c)=>a+condH(c||''),0);
  const dayPay=Math.round(r*dh);
  const nightPay=Math.round(r*nh);
  const annPay=Math.round(r*ah);
  const sickPay=Math.round(r*bh);
  const condPay=Math.round(r*ch);
  const juhyuPay=Math.round(r*8*juhyuVals[gi]);
  const m=manual[gi];
  const total=dayPay+nightPay+annPay+sickPay+condPay+juhyuPay+m.longserve+m.vuln;
  const tax=lookupTax(total);
  const resident=Math.floor(tax*0.1);
  const ex=m.ex;
  const pension=ex.pension?0:Math.round(total*0.045);
  const health=ex.health?0:Math.round(total*0.03545);
  const ltcare=ex.ltcare?0:Math.round(health*0.1295);
  const employ=ex.employ?0:Math.round(total*0.009);
  const deduct=tax+resident+pension+health+ltcare+employ;
  const net=total-deduct;
  return{dayPay,nightPay,annPay,sickPay,condPay,juhyuPay,total,tax,resident,pension,health,ltcare,employ,deduct,net};
}

    <td class="sum"></td><td class="sum"></td>
    <td class="sum grp" id="s-total" style="font-weight:600"></td>
    <td class="sum grp2" id="s-tax"></td><td class="sum grp2" id="s-res"></td>
    <td class="sum grp2" id="s-pen"></td><td class="sum grp2" id="s-hlt"></td>
    <td class="sum grp2" id="s-ltc"></td><td class="sum grp2" id="s-emp"></td>
    <td class="sum grp red" id="s-deduct"></td>
    <td class="sum grp" id="s-net" style="font-weight:600"></td>
  </tr>`;
  document.getElementById('payBody').innerHTML=html;
  updateTotals();
}

function updateTotals(){
  let t={dayPay:0,nightPay:0,annPay:0,sickPay:0,condPay:0,juhyuPay:0,total:0,tax:0,resident:0,pension:0,health:0,ltcare:0,employ:0,deduct:0,net:0};
  employees.forEach((_,gi)=>{const p=calcPay(gi);Object.keys(t).forEach(k=>t[k]+=p[k]);});
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v.toLocaleString();};
  set('s-day',t.dayPay);set('s-night',t.nightPay);set('s-ann',t.annPay);
  set('s-sick',t.sickPay);set('s-cond',t.condPay);set('s-juhyu',t.juhyuPay);
  set('s-total',t.total);set('s-tax',t.tax);set('s-res',t.resident);
  set('s-pen',t.pension);set('s-hlt',t.health);set('s-ltc',t.ltcare);
  set('s-emp',t.employ);set('s-deduct',t.deduct);set('s-net',t.net);
  const sb=document.getElementById('summaryBar');
  if(sb)sb.innerHTML=`
    <div class="sum-card"><div class="sum-card-label">지급총액 합계</div><div class="sum-card-val">${t.total.toLocaleString()}원</div></div>
    <div class="sum-card"><div class="sum-card-label">공제총액 합계</div><div class="sum-card-val" style="color:#A32D2D">${t.deduct.toLocaleString()}원</div></div>
    <div class="sum-card"><div class="sum-card-label">실지급액 합계</div><div class="sum-card-val" style="color:#0C447C">${t.net.toLocaleString()}원</div></div>`;
}

function pyRefreshRow(gi){
  const p=calcPay(gi);const ex=manual[gi].ex;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set(`py-tt-${gi}`,p.total.toLocaleString());
  set(`py-tx-${gi}`,pn(p.tax));
  set(`py-re-${gi}`,pn(p.resident));
  set(`pension-${gi}`,ex.pension?'0':pn(p.pension));
  set(`health-${gi}`,ex.health?'0':pn(p.health));
  set(`ltcare-${gi}`,ex.ltcare?'0':pn(p.ltcare));
  set(`employ-${gi}`,ex.employ?'0':pn(p.employ));
  set(`py-dd-${gi}`,p.deduct.toLocaleString());
  set(`py-nt-${gi}`,p.net.toLocaleString());
  updateTotals();
}

function upM(gi,field,val){manual[gi][field]=parseInt(val)||0;pyRefreshRow(gi);}
function upE(gi,field,val){manual[gi].ex[field]=val==='Y';pyRefreshRow(gi);}

══════════════════════════════════════ */
buildTable();
buildPayTable();
</script>
