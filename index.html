function calcStats(gi){
  const s=schedules[gi];
  const cnt={};CODES.forEach(c=>cnt[c]=0);
  let dh=0,nh=0,ah=0,sh=0,ch=0,wd=0;
  s.forEach(c=>{
    if(c&&cnt[c]!==undefined)cnt[c]++;
    dh+=dayH(c||'');nh+=nightH(c||'');ah+=annH(c||'');
    sh+=sickH(c||'');ch+=condH(c||'');wd+=wdayVal(c||'');
  });
  return{cnt,dh,nh,ah,sh,ch,total:dh+nh+ah+sh+ch,wd};
}

  const depts=['мӢңм„Ө/мӮ¬л¬ҙ','мқҳлЈҢ','ліёкҙҖ','мӢ кҙҖ2мёө','мӢ кҙҖ1мёө'];

      schedules[gi].forEach((code,di)=>{

      });
      CODES.forEach((c,i)=>{
        const col=CNT_COLORS[c]||'var(--color-text-secondary)';
        const bdr=i===0?'border-left:2px solid var(--color-border-secondary)':'';
        body+=`<td class="cnt-td" style="color:${col};${bdr}" id="cnt-${gi}-${c}">${st.cnt[c]||''}</td>`;
      });
      const times=[st.dh,st.nh,st.ah,st.sh,st.ch,st.total,st.wd];
      times.forEach((v,i)=>{
        const bold=i>=5?' bold':'';
        const bdr=i===0?'border-left:2px solid var(--color-border-secondary)':'';
        body+=`<td class="time-td${bold}" style="${bdr}" id="th-${gi}-${i}">${fmtNum(v)}</td>`;
      });
      body+=`<td class="time-td" style="border-left:2px solid var(--color-border-secondary)"><input class="juhyu-input" type="number" min="0" max="10" step="1" value="${juhyuVals[gi]}" onchange="juhyuVals[${gi}]=+this.value"></td>`;
      body+='</tr>';
    });
  });
  document.getElementById('tbody').innerHTML=body;
}

function refreshRow(gi){
  const st=calcStats(gi);
  CODES.forEach(c=>{
    const el=document.getElementById(`cnt-${gi}-${c}`);
    if(el)el.textContent=st.cnt[c]||'';
  });
  [st.dh,st.nh,st.ah,st.sh,st.ch,st.total,st.wd].forEach((v,i)=>{
    const el=document.getElementById(`th-${gi}-${i}`);
    if(el)el.textContent=fmtNum(v);
  });
}

function togglePopup(e,gi,di){
  e.stopPropagation();
  const key=`${gi}-${di}`;
  if(activePopupKey===key){closePopup();return;}
  closePopup();
  const cell=e.currentTarget;
  const wrap=document.getElementById('tableWrap');
  const cr=cell.getBoundingClientRect();
  const wr=wrap.getBoundingClientRect();
  const top=cr.bottom-wr.top+wrap.scrollTop+4;
  const left=cr.left-wr.left+wrap.scrollLeft;
  const popup=document.createElement('div');
  popup.className='popup';
  popup.style.cssText=`position:absolute;top:${top}px;left:${left}px`;
  CODES.forEach(code=>{
    const c=CODE_COLORS[code];
    const opt=document.createElement('div');
    opt.className='pop-opt';
    opt.style.cssText=`background:${c.bg};color:${c.txt}`;
    opt.textContent=code;
    opt.onclick=ev=>{ev.stopPropagation();applyCode(gi,di,code);closePopup();};
    popup.appendChild(opt);
  });
  const clr=document.createElement('div');
  clr.className='pop-clear';clr.textContent='- л№„мҡ°кё°';
  clr.onclick=ev=>{ev.stopPropagation();applyCode(gi,di,null);closePopup();};
  popup.appendChild(clr);
  wrap.appendChild(popup);
  activePopup=popup;
  activePopupKey=key;
}

function closePopup(){
  if(activePopup){activePopup.remove();activePopup=null;activePopupKey=null;}
}

function applyCode(gi,di,code){
  schedules[gi][di]=code;
  const cell=document.querySelector(`.cell[data-emp="${gi}"][data-day="${di}"]`);
  if(cell){cell.className='cell '+cellCls(code);cell.textContent=code||'-';}
  refreshRow(gi);
}

function filterDept(dept,btn){
  currentDept=dept;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');applyFilter();
}

function applyFilter(){
  const q=document.getElementById('search').value.trim();
  document.querySelectorAll('#tbody tr').forEach(r=>{
    if(r.classList.contains('section-header')){
      r.style.display=(currentDept==='all'||currentDept===r.dataset.dept)?'':'none';return;
    }
    const ok=(!q||r.dataset.name.includes(q))&&(currentDept==='all'||currentDept===r.dataset.dept);
    r.style.display=ok?'':'none';
  });
}

document.addEventListener('click',e=>{
  if(activePopup&&!activePopup.contains(e.target))closePopup();
});
buildTable();
</script>
